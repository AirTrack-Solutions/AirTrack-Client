<div id="ariaWidget" style="display:block" data-page-context="{{ aria_page_context|default('') }}">

  <!-- Floating button -->
  <button id="ariaToggle" title="Ask Aria" aria-label="Open Aria chat">
    <span id="ariaToggleIcon">✦</span>
  </button>

  <!-- Chat panel -->
  <div id="ariaPanel" class="aria-panel aria-closed">
    <div class="aria-header">
      <span class="aria-title">✦ Aria</span>
      <span class="aria-model" id="ariaModelLabel"></span>
      <button class="aria-close" id="ariaClose" title="Close">✕</button>
    </div>
    {% if aria_banner %}
    <div class="aria-banner">{{ aria_banner }}</div>
    {% endif %}
    <div class="aria-messages" id="ariaMessages">
      <div class="aria-msg aria-msg-assistant">
        Hi, I'm Aria — your AirTrack assistant. Ask me anything about aviation or how to use AirTrack.
      </div>
    </div>
    <div class="aria-input-row">
      <input type="text" id="ariaInput" placeholder="Ask Aria…" autocomplete="off" maxlength="500">
      <button id="ariaSend" title="Send">➤</button>
    </div>
  </div>

</div>

<style>
#ariaToggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: url('/static/images/woodland/aria_button.png') center/cover no-repeat, #0e1e14;
  border: 2px solid #00ff66;
  cursor: pointer;
  font-size: 0;
  color: transparent;
  box-shadow: 0 4px 18px rgba(0,255,102,0.25);
  z-index: 1000;
  transition: box-shadow .15s, transform .15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
#ariaToggle:hover { box-shadow: 0 4px 24px rgba(0,255,102,0.55); transform: scale(1.05); }

.aria-panel {
  position: fixed;
  bottom: 88px;
  right: 24px;
  width: 340px;
  max-height: 520px;
  background: #0e1e14;
  border: 1px solid #1a4a2a;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  z-index: 999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.55);
  transition: opacity .2s, transform .2s;
}
.aria-closed { opacity:0; transform: translateY(12px) scale(0.97); pointer-events:none; }
.aria-open   { opacity:1; transform: translateY(0) scale(1); pointer-events:all; }

.aria-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px 10px;
  border-bottom: 1px solid #1a3a1a;
}
.aria-title  { color: #00ff66; font-weight: 700; font-size: 0.95rem; }
.aria-model  { color: #444; font-size: 0.72rem; font-family: monospace; }
.aria-close  {
  margin-left: auto;
  background: none;
  border: none;
  color: #555;
  cursor: pointer;
  font-size: 0.9rem;
  padding: 2px 6px;
  border-radius: 4px;
}
.aria-close:hover { color: #cc4444; background: #1a0a0a; }

.aria-banner {
  background: rgba(192,57,43,0.15);
  border-bottom: 1px solid rgba(192,57,43,0.3);
  color: rgba(255,180,170,0.9);
  font-size: 0.75rem;
  padding: 7px 14px;
  text-align: center;
  line-height: 1.4;
  font-weight: 500;
}

.aria-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
  scrollbar-color: #1a3a1a transparent;
}

.aria-msg {
  font-size: 0.85rem;
  line-height: 1.55;
  padding: 9px 12px;
  border-radius: 10px;
  max-width: 90%;
  word-wrap: break-word;
}
.aria-msg-user {
  background: #0a2a0a;
  color: #d0ffd8;
  border: 1px solid #1a4a1a;
  align-self: flex-end;
  border-bottom-right-radius: 3px;
}
.aria-msg-assistant {
  background: #111;
  color: #e6e6e6;
  border: 1px solid #1e1e1e;
  align-self: flex-start;
  border-bottom-left-radius: 3px;
}
.aria-msg-error {
  background: #1a0a0a;
  color: #cc4444;
  border: 1px solid #3a1a1a;
  align-self: flex-start;
  font-size: 0.78rem;
}

.aria-typing::after {
  content: '▋';
  animation: blink .7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.aria-input-row {
  display: flex;
  gap: 8px;
  padding: 10px 14px 12px;
  border-top: 1px solid #1a3a1a;
}
#ariaInput {
  flex: 1;
  background: #0a1a0a;
  border: 1px solid #1a3a1a;
  border-radius: 8px;
  color: #e6e6e6;
  padding: 7px 10px;
  font-size: 0.85rem;
  outline: none;
}
#ariaInput:focus { border-color: #00ff66; }
#ariaInput::placeholder { color: #334; }
#ariaSend {
  background: #00ff66;
  border: none;
  border-radius: 8px;
  color: #000;
  padding: 7px 13px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 700;
  transition: filter .1s;
}
#ariaSend:hover:not(:disabled) { filter: brightness(.88); }
#ariaSend:disabled { opacity: .4; cursor: not-allowed; }

@media (max-width: 420px) {
  .aria-panel { width: calc(100vw - 32px); right: 16px; }
}
</style>

<script>
(function () {
  const widget   = document.getElementById('ariaWidget');
  const toggle   = document.getElementById('ariaToggle');
  const panel    = document.getElementById('ariaPanel');
  const closeBtn = document.getElementById('ariaClose');
  const input    = document.getElementById('ariaInput');
  const send     = document.getElementById('ariaSend');
  const msgs     = document.getElementById('ariaMessages');
  const modelLbl = document.getElementById('ariaModelLabel');

  let history = [];
  const ariaPageContext = (document.getElementById('ariaWidget').dataset.pageContext || '');
  let busy    = false;
  let open    = false;

  // Widget is visible by default. Hide it only if status check confirms Aria is down.
  fetch('/aria/status')
    .then(r => r.json())
    .then(data => {
      if (data.available) {
        modelLbl.textContent = data.model;
      } else {
        widget.style.display = 'none';
      }
    })
    .catch(() => {
      // If the check itself fails, leave the widget visible so the
      // user can at least try — the chat endpoint will return a clear error.
    });

  function togglePanel() {
    open = !open;
    panel.className = 'aria-panel ' + (open ? 'aria-open' : 'aria-closed');
    if (open) { input.focus(); scrollToBottom(); }
  }
  window.ariaTogglePanel = togglePanel;

  function scrollToBottom() {
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'aria-msg aria-msg-' + role;
    div.textContent = text;
    msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || busy) return;

    busy = true;
    send.disabled = true;
    input.value = '';

    addMsg('user', text);

    const typingDiv = document.createElement('div');
    typingDiv.className = 'aria-msg aria-msg-assistant aria-typing';
    typingDiv.textContent = '';
    msgs.appendChild(typingDiv);
    scrollToBottom();

    try {
      const resp = await fetch('/aria/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history, page_context: ariaPageContext }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        typingDiv.className = 'aria-msg aria-msg-error';
        typingDiv.textContent = err.error || 'Aria is unavailable right now.';
        busy = false; send.disabled = false;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let fullReply = '';
      typingDiv.className = 'aria-msg aria-msg-assistant aria-typing';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;
          try {
            const obj = JSON.parse(raw);
            if (obj.token) {
              fullReply += obj.token;
              typingDiv.textContent = fullReply;
              scrollToBottom();
            }
            if (obj.error) {
              typingDiv.className = 'aria-msg aria-msg-error';
              typingDiv.textContent = obj.error;
            }
          } catch (_) {}
        }
      }

      typingDiv.className = 'aria-msg aria-msg-assistant';
      // Strip any trailing (Note: ...) annotations the model may add
      const cleanReply = fullReply.replace(/\s*\(Note:[^)]*\)[\s\S]*/i, '').trim();
      typingDiv.textContent = cleanReply;
      history.push({ role: 'user',      content: text });
      history.push({ role: 'assistant', content: cleanReply });
      // Keep history bounded
      if (history.length > 40) history = history.slice(-40);

    } catch (e) {
      typingDiv.className = 'aria-msg aria-msg-error';
      typingDiv.textContent = 'Network error — is AirTrack running?';
    }

    busy = false;
    send.disabled = false;
    input.focus();
  }

  toggle.addEventListener('click', togglePanel);
  closeBtn.addEventListener('click', togglePanel);
  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
})();
</script>
