services:
  git-bootstrap:
    image: alpine/git:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    env_file: .env.client
    volumes:
      - repo_data:/app
    command: >
      "echo 'Fetching $$GIT_REMOTE…';
       find /app -mindepth 1 -delete;
       git clone --depth=1 $$GIT_REMOTE /tmp/airtrack-repo;
       cp -a /tmp/airtrack-repo/app/. /app/;
       rm -rf /tmp/airtrack-repo;
       echo 'Done.'"

  airtrack:
    build:
      context: ./app
      dockerfile: Dockerfile
    depends_on:
      git-bootstrap:
        condition: service_completed_successfully
      airtrack-db:
        condition: service_started
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env.client
    environment:
      - FLASK_DEBUG=0
      - AIRTRACK_ENABLE_SHUTDOWN=1
      - AIRTRACK_SHUTDOWN_TOKEN=change-me
      - AIRTRACK_ROLE=client
    volumes:
      - repo_data:/app
      - ./logs:/app/logs:rw
      - ./app/config/license.lic:/app/config/license.lic:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  airtrack-db:
    image: mariadb:11.4
    restart: unless-stopped
    env_file: .env.client
    volumes:
      - db_data:/var/lib/mysql
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  repo_data:
  db_data: