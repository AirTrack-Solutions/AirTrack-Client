# AirTrack Linux Client
# https://github.com/AirTrack-Solutions/AirTrack-Client

services:
  airtrack:
    image: ghcr.io/airtrack-solutions/airtrack-client:latest
    restart: unless-stopped
    depends_on:
      airtrack-db:
        condition: service_started
    ports:
      - "${AIRTRACK_PORT:-5000}:5000"
    env_file: .env
    environment:
      - FLASK_DEBUG=0
      - AIRTRACK_ROLE=client
      - AIRTRACK_HOME=/airtrack_data
      - MYSQL_HOST=airtrack-db
    volumes:
      - ./data:/airtrack_data:rw
      - ./logs:/app/logs:rw
      - ./keys:/app/keys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  airtrack-db:
    image: mariadb:11.4
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
